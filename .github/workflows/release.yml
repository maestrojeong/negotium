name: Publish npm packages

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'maestrojeong/Negotium'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Use a trusted-publishing compatible npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release manifests
        run: bun run release:check

      - name: Lint and build
        run: bun run check

      - name: Test
        run: bun test

      - name: Smoke-test packed packages
        run: bun run release:smoke

      - name: Pack with Bun and publish with npm OIDC
        run: bun run release:ci
